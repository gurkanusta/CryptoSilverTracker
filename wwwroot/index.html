<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto & Precious Metals Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        h2 {
            color: #e2e8f0;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 10px;
            margin-top: 40px;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            border: 1px solid #334155;
        }

            .card h3 {
                margin: 0 0 10px 0;
                font-size: 1.1em;
                color: #94a3b8;
                text-transform: capitalize;
            }

            .card p {
                margin: 0 0 5px 0;
                font-size: 1.8em;
                font-weight: 700;
                color: #f8fafc;
            }

        .change {
            font-size: 0.9em;
            font-weight: bold;
        }

            .change.up {
                color: var(--green);
            }

            .change.down {
                color: var(--red);
            }

        .section-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 40px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select, input {
            background: #0f172a;
            color: white;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            font-size: 16px;
            outline: none;
        }

        input {
            width: 150px;
        }

        .portfolio-total {
            font-size: 2em;
            color: var(--accent);
            font-weight: bold;
            margin-top: 15px;
        }

        canvas {
            max-width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Canlı Piyasa Fiyatları</h2>
        <div class="price-grid" id="priceContainer">
            <p>Veriler yükleniyor...</p>
        </div>

        <div class="section-box">
            <h2>Kişisel Portföy (Cüzdan)</h2>
            <div class="controls" id="portfolioInputs">
            </div>
            <div class="portfolio-total" id="portfolioTotal">Toplam: $0.00</div>
        </div>

        <div class="section-box">
            <h2>Piyasa Analiz Grafiği</h2>
            <div class="controls">
                <select id="coinSelect" onchange="loadChart()">
                    <option value="bitcoin">Bitcoin (BTC)</option>
                    <option value="ethereum">Ethereum (ETH)</option>
                    <option value="solana">Solana (SOL)</option>
                    <option value="ripple">Ripple (XRP)</option>
                    <option value="tether-gold">Tether Gold (XAUT)</option>
                    <option value="paxg">PAX Gold (PAXG)</option>
                    <option value="kinesis-silver">Kinesis Silver (KAG)</option>
                </select>
                <select id="daySelect" onchange="loadChart()">
                    <option value="1">Son 24 Saat</option>
                    <option value="7">Son 7 Gün</option>
                    <option value="30">Son 30 Gün</option>
                </select>
            </div>
            <canvas id="marketChart"></canvas>
        </div>
    </div>

    <script>
        let chartInstance = null;
        let currentPrices = {};

        async function loadPrices() {
            const response = await fetch('/api/coins/prices');
            const data = await response.json();

            const container = document.getElementById('priceContainer');
            const portfolioInputs = document.getElementById('portfolioInputs');

            if (container.innerHTML.includes('yükleniyor')) {
                container.innerHTML = '';
                portfolioInputs.innerHTML = '';
            }

            data.forEach(coin => {
                currentPrices[coin.id] = coin.currentPrice;
                let displayName = coin.id.replace('-', ' ');
                let changeClass = coin.change24h >= 0 ? 'up' : 'down';
                let changeSign = coin.change24h >= 0 ? '+' : '';

                
                let existingCard = document.getElementById(`card-${coin.id}`);
                let cardHtml = `
                            <h3>${displayName}</h3>
                            <p>$${coin.currentPrice.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 })}</p>
                            <div class="change ${changeClass}">${changeSign}${coin.change24h.toFixed(2)}% (24s)</div>
                        `;

                if (existingCard) existingCard.innerHTML = cardHtml;
                else container.innerHTML += `<div class="card" id="card-${coin.id}">${cardHtml}</div>`;

                
                if (!document.getElementById(`input-${coin.id}`)) {
                    portfolioInputs.innerHTML += `
                                <div>
                                    <label style="display:block; margin-bottom:5px; color:#94a3b8; font-size:0.9em;">${displayName} Miktarı</label>
                                    <input type="number" id="input-${coin.id}" value="0" step="any" oninput="calculatePortfolio()">
                                </div>
                            `;
                }
            });
            calculatePortfolio();
        }

        function calculatePortfolio() {
            let total = 0;
            for (let coinId in currentPrices) {
                let amount = parseFloat(document.getElementById(`input-${coinId}`)?.value || 0);
                total += amount * currentPrices[coinId];
            }
            document.getElementById('portfolioTotal').innerText = `Toplam: $${total.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        async function loadChart() {
            const coinId = document.getElementById('coinSelect').value;
            const days = document.getElementById('daySelect').value;
            const response = await fetch(`/api/coins/history/${coinId}/${days}`);
            const data = await response.json();

            const labels = data.prices.map(p => new Date(p[0]).toLocaleDateString());
            const prices = data.prices.map(p => p[1]);

            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('marketChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: `${coinId} Fiyatı`, data: prices, borderColor: '#3b82f6', tension: 0.3 }] },
                options: { responsive: true }
            });
        }

        loadPrices();
        loadChart();
        setInterval(loadPrices, 60000);
    </script>
</body>
</html>
