<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto & Precious Metals Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        h2 {
            color: #e2e8f0;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 10px;
            margin-top: 40px;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            border: 1px solid #334155;
        }

            .card h3 {
                margin: 0 0 10px 0;
                font-size: 1.1em;
                color: #94a3b8;
                text-transform: capitalize;
            }

            .card p {
                margin: 0 0 5px 0;
                font-size: 1.8em;
                font-weight: 700;
                color: #f8fafc;
            }

        .change {
            font-size: 0.9em;
            font-weight: bold;
        }

            .change.up {
                color: var(--green);
            }

            .change.down {
                color: var(--red);
            }

        .section-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 40px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select, input {
            background: #0f172a;
            color: white;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            font-size: 16px;
            outline: none;
        }

        input {
            width: 150px;
        }

        .portfolio-total {
            font-size: 2em;
            color: var(--accent);
            font-weight: bold;
            margin-top: 15px;
        }

        canvas {
            max-width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Live Market Prices</h2>
        <div class="price-grid" id="priceContainer">
            <p>Loading data...</p>
        </div>

        <div class="section-box">
            <h2>Personal Portfolio (Wallet)</h2>
            <div style="display: flex; gap: 40px; flex-wrap: wrap; align-items: center;">
                <div class="controls" id="portfolioInputs" style="flex: 1; min-width: 250px;">
                </div>
                <div style="flex: 1; max-width: 300px; text-align: center;">
                    <canvas id="portfolioChart"></canvas>
                    <div class="portfolio-total" id="portfolioTotal">Total: $0.00</div>
                </div>
            </div>
        </div>

        <div class="section-box">
            <h2>Market Analysis Chart</h2>
            <div class="controls">
                <select id="coinSelect" onchange="loadChart()">
                    <option value="bitcoin">Bitcoin (BTC)</option>
                    <option value="ethereum">Ethereum (ETH)</option>
                    <option value="solana">Solana (SOL)</option>
                    <option value="ripple">Ripple (XRP)</option>
                    <option value="tether-gold">Tether Gold (XAUT)</option>
                    <option value="paxg">PAX Gold (PAXG)</option>
                    <option value="kinesis-silver">Kinesis Silver (KAG)</option>
                </select>
                <select id="daySelect" onchange="loadChart()">
                    <option value="1">Last 24 Hours</option>
                    <option value="7">Last 7 Days</option>
                    <option value="30">Last 30 Days</option>
                </select>
            </div>
            <canvas id="marketChart"></canvas>
        </div>
    </div>

    <script>
        let chartInstance = null;
        let portfolioChartInstance = null;
        let currentPrices = {};

        async function loadPrices() {
            try {
                const response = await fetch('/api/coins/prices');
                const data = await response.json();

                const container = document.getElementById('priceContainer');
                const portfolioInputs = document.getElementById('portfolioInputs');

                if (container.innerHTML.includes('Loading')) {
                    container.innerHTML = '';
                    portfolioInputs.innerHTML = '';
                }

                data.forEach(coin => {
                    currentPrices[coin.id] = coin.currentPrice;
                    let displayName = coin.id.replace('-', ' ');
                    let changeClass = coin.change24h >= 0 ? 'up' : 'down';
                    let changeSign = coin.change24h >= 0 ? '+' : '';

                    let existingCard = document.getElementById(`card-${coin.id}`);
                    let cardHtml = `
                            <h3>${displayName}</h3>
                            <p>$${coin.currentPrice.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 })}</p>
                            <div class="change ${changeClass}">${changeSign}${coin.change24h.toFixed(2)}% (24h)</div>
                        `;

                    if (existingCard) {
                        existingCard.innerHTML = cardHtml;
                    } else {
                        container.innerHTML += `<div class="card" id="card-${coin.id}">${cardHtml}</div>`;
                    }

                    if (!document.getElementById(`input-${coin.id}`)) {
                        portfolioInputs.innerHTML += `
                                <div>
                                    <label style="display:block; margin-bottom:5px; color:#94a3b8; font-size:0.9em;">${displayName} Amount</label>
                                    <input type="number" id="input-${coin.id}" value="0" step="any" oninput="calculatePortfolio()">
                                </div>
                            `;
                    }
                });
                calculatePortfolio();
            } catch (error) {
                console.error("Error loading prices:", error);
            }
        }

        function calculatePortfolio() {
            let total = 0;
            let chartLabels = [];
            let chartData = [];

            for (let coinId in currentPrices) {
                let amount = parseFloat(document.getElementById(`input-${coinId}`)?.value || 0);
                let valueInUsd = amount * currentPrices[coinId];
                total += valueInUsd;

                if (valueInUsd > 0) {
                    chartLabels.push(coinId.replace('-', ' ').toUpperCase());
                    chartData.push(valueInUsd);
                }
            }

            document.getElementById('portfolioTotal').innerText = `Total: $${total.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            updatePortfolioChart(chartLabels, chartData);
        }

        function updatePortfolioChart(labels, data) {
            if (portfolioChartInstance) {
                portfolioChartInstance.destroy();
            }

            if (data.length === 0) return;

            const ctx = document.getElementById('portfolioChart').getContext('2d');
            portfolioChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#f59e0b', '#3b82f6', '#10b981', '#ef4444', '#8b5cf6', '#14b8a6', '#f43f5e', '#eab308'],
                        borderWidth: 2,
                        borderColor: '#1e293b'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#f8fafc' } }
                    }
                }
            });
        }

        async function loadChart() {
            try {
                const coinId = document.getElementById('coinSelect').value;
                const days = document.getElementById('daySelect').value;
                const response = await fetch(`/api/coins/history/${coinId}/${days}`);
                const data = await response.json();

                const labels = data.prices.map(p => new Date(p[0]).toLocaleDateString());
                const prices = data.prices.map(p => p[1]);

                if (chartInstance) chartInstance.destroy();
                const ctx = document.getElementById('marketChart').getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: [{ label: `${coinId.replace('-', ' ').toUpperCase()} Price (USD)`, data: prices, borderColor: '#3b82f6', tension: 0.3 }] },
                    options: { responsive: true }
                });
            } catch (error) {
                console.error("Error loading chart:", error);
            }
        }

        loadPrices();
        loadChart();
        setInterval(loadPrices, 60000);
    </script>
</body>
</html>
