<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto & Precious Metals Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        h2 {
            color: #e2e8f0;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 10px;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
            border: 1px solid #334155;
        }

            .card:hover {
                transform: translateY(-5px);
                border-color: var(--accent);
            }

            .card h3 {
                margin: 0 0 10px 0;
                font-size: 1.1em;
                color: #94a3b8;
                text-transform: capitalize;
            }

            .card p {
                margin: 0;
                font-size: 1.8em;
                font-weight: 700;
                color: #10b981;
            }

        .chart-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select {
            background: #0f172a;
            color: white;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            font-size: 16px;
            outline: none;
            cursor: pointer;
        }

            select:focus {
                border-color: var(--accent);
            }

        canvas {
            max-width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Canlı Piyasa Fiyatları</h2>
        <div class="price-grid" id="priceContainer">
            <p>Veriler yükleniyor...</p>
        </div>

        <div class="chart-section">
            <h2>Piyasa Analiz Grafiği</h2>
            <div class="controls">
                <select id="coinSelect" onchange="loadChart()">
                    <option value="bitcoin">Bitcoin (BTC)</option>
                    <option value="ethereum">Ethereum (ETH)</option>
                    <option value="solana">Solana (SOL)</option>
                    <option value="ripple">Ripple (XRP)</option>
                    <option value="tether-gold">Tether Gold (XAUT - Altın)</option>
                    <option value="paxg">PAX Gold (PAXG - Altın)</option>
                    <option value="kinesis-silver">Kinesis Silver (KAG - Gümüş)</option>
                </select>
                <select id="daySelect" onchange="loadChart()">
                    <option value="1">Son 24 Saat</option>
                    <option value="7">Son 7 Gün</option>
                    <option value="30">Son 30 Gün</option>
                </select>
            </div>
            <canvas id="marketChart"></canvas>
        </div>
    </div>

    <script>
        let chartInstance = null;

        async function loadPrices() {
            try {
                const response = await fetch('/api/coins/prices');
                const data = await response.json();

                const container = document.getElementById('priceContainer');
                container.innerHTML = '';

                data.forEach(coin => {
                    let displayName = coin.id.replace('-', ' ');
                    container.innerHTML += `
                                <div class="card">
                                    <h3>${displayName}</h3>
                                    <p>$${coin.currentPrice.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 })}</p>
                                </div>
                            `;
                });
            } catch (error) {
                console.error("Fiyatlar çekilemedi:", error);
            }
        }

        async function loadChart() {
            const coinId = document.getElementById('coinSelect').value;
            const days = document.getElementById('daySelect').value;

            try {
                const response = await fetch(`/api/coins/history/${coinId}/${days}`);
                const data = await response.json();

                const labels = data.prices.map(p => {
                    const date = new Date(p[0]);
                    return days == 1 ? date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : date.toLocaleDateString();
                });

                const prices = data.prices.map(p => p[1]);

                if (chartInstance) chartInstance.destroy();

                const ctx = document.getElementById('marketChart').getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: `${coinId.replace('-', ' ').toUpperCase()} Fiyatı (USD)`,
                            data: prices,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 3,
                            pointRadius: 0,
                            pointHoverRadius: 6,
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { labels: { color: '#f8fafc' } } },
                        scales: {
                            x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                            y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                        },
                        interaction: { intersect: false, mode: 'index' }
                    }
                });
            } catch (error) {
                console.error("Grafik verisi çekilemedi:", error);
            }
        }

        loadPrices();
        loadChart();
        setInterval(loadPrices, 60000);
    </script>
</body>
</html>
